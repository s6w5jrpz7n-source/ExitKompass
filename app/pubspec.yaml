name: exitkompass_app
description: "ExitKompass – Szenariorechner für Kündigung, Aufhebungsvertrag, Abfindung und ALG 1."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  exit_engine:
    path: ../packages/exit_engine
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.69.0
  http: ^1.2.0
  intl: ^0.19.0
  pdf: ^3.11.0
  printing: ^5.13.0
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  file_picker: ^8.1.2
  web: ^1.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.0
  shared_preferences_platform_interface: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/DejaVuSans.ttf
    - assets/fonts/DejaVuSans-Bold.ttf
  # Bundled UI font so text renders offline. The CanvasKit web renderer
  # otherwise fetches Roboto from fonts.gstatic.com; when that host is blocked
  # (content blockers, restrictive networks, iOS Lockdown Mode) no text paints
  # and the app looks like a blank white page.
  fonts:
    - family: DejaVuSans
      fonts:
        - asset: assets/fonts/DejaVuSans.ttf
        - asset: assets/fonts/DejaVuSans-Bold.ttf
          weight: 700
