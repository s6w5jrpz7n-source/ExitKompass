name: exitkompass_app
description: "ExitKompass – Szenariorechner für Kündigung, Aufhebungsvertrag, Abfindung und ALG 1."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  exit_engine:
    path: ../packages/exit_engine
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.69.0
  intl: ^0.19.0
  pdf: ^3.11.0
  printing: ^5.13.0
  drift: ^2.20.0
  drift_flutter: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/DejaVuSans.ttf
    - assets/fonts/DejaVuSans-Bold.ttf
